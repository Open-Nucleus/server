name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    name: Go (build + test + smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build all binaries
        run: make build-all

      - name: Run Go tests
        run: make test-all

      - name: Run smoke test
        run: make smoke

  python:
    name: Python (Sentinel Agent tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/sentinel
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Sentinel tests
        run: PYTHONPATH=src python -m pytest tests/ -v
