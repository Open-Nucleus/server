server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  max_request_body: 5MB

auth:
  jwt_issuer: open-nucleus-auth
  token_lifetime: 24h
  refresh_window: 2h

rate_limit:
  read_rpm: 200
  read_burst: 50
  write_rpm: 60
  write_burst: 20
  auth_rpm: 10
  auth_burst: 5

cors:
  allowed_origins:
    - "http://localhost:*"
    - "https://localhost:*"
    - "http://127.0.0.1:*"
    - "https://127.0.0.1:*"

websocket:
  ping_interval: 30s
  max_connections: 10

logging:
  level: info
  audit_file: data/audit.log
  format: json

smart:
  enabled: true
  base_url: http://localhost:8080

data:
  repo_path: data/repo
  db_path: data/nucleus.db
  author_name: nucleus-node
  author_email: node@open-nucleus.local

encryption:
  enabled: false

tls:
  mode: "off"

anchor:
  backend: hedera        # "hedera" or "stub"
  network: testnet
  operator_id: ""        # e.g. "0.0.12345" — set before running
  operator_key: ""       # hex Ed25519 key, or set NUCLEUS_HEDERA_KEY env var
  topic_id: ""           # HCS topic for anchoring, e.g. "0.0.67890"
  # did_topic_id: ""     # optional, defaults to topic_id
  # mirror_url: ""       # optional, auto-detected from network
