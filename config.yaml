server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  max_request_body: 5MB

auth:
  jwt_issuer: open-nucleus-auth
  token_lifetime: 24h
  refresh_window: 2h

grpc:
  patient_service: localhost:50051
  sync_service: localhost:50052
  auth_service: localhost:50053
  formulary_service: localhost:50054
  anchor_service: localhost:50055
  sentinel_agent: localhost:50056
  dial_timeout: 5s
  request_timeout: 30s

rate_limit:
  read_rpm: 200
  read_burst: 50
  write_rpm: 60
  write_burst: 20
  auth_rpm: 10
  auth_burst: 5

cors:
  allowed_origins:
    - "http://localhost:*"
    - "http://127.0.0.1:*"

websocket:
  ping_interval: 30s
  max_connections: 10

logging:
  level: info
  audit_file: /var/log/open-nucleus/audit.log
  format: json

smart:
  enabled: true
  base_url: http://localhost:8080
