server:
  port: 8080
  read_timeout: 30s
  write_timeout: 30s
  max_request_body: 5MB

auth:
  jwt_issuer: open-nucleus-auth
  token_lifetime: 24h
  refresh_window: 2h

rate_limit:
  read_rpm: 200
  read_burst: 50
  write_rpm: 60
  write_burst: 20
  auth_rpm: 10
  auth_burst: 5

cors:
  allowed_origins:
    - "http://localhost:*"
    - "https://localhost:*"
    - "http://127.0.0.1:*"
    - "https://127.0.0.1:*"
    - "tauri://localhost"
    - "https://tauri.localhost"
    - "http://tauri.localhost"

websocket:
  ping_interval: 30s
  max_connections: 10

logging:
  level: info
  audit_file: data/audit.log
  format: json

smart:
  enabled: true
  base_url: http://localhost:8080

data:
  repo_path: data/repo
  db_path: data/nucleus.db
  author_name: nucleus-node
  author_email: node@open-nucleus.local

encryption:
  enabled: false

tls:
  mode: "off"

anchor:
  backend: iota           # "hedera", "iota", or "stub"
  network: testnet
  # --- Hedera HCS config ---
  operator_id: "0.0.4560302"
  operator_key: "0x31e943e883bab5fd43071a90ab983c83e1b5cfd9981c6ac124512f012f0a5f69"
  topic_id: "0.0.8334822"
  did_topic_id: "0.0.8334824"
  # mirror_url: ""       # optional, auto-detected from network
  # --- HTS Credential NFTs (auto-created if empty) ---
  credential_token_id: ""  # HTS Token ID for practitioner credential NFTs
  # --- IOTA Rebased config (set backend: iota to use) ---
  rpc_url: "https://api.testnet.iota.cafe"
  anchor_package_id: "0x415ad71351d3b27cb6dfc01547204a0dfa11431c1008083b602adf84e3f4028a"
  # identity_package_id: ""  # defaults to anchor_package_id
  identity_bridge_url: "http://localhost:3001"
