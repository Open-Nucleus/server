syntax = "proto3";

package patient.v1;

option go_package = "github.com/FibrinLab/open-nucleus/gen/proto/patient/v1;patientv1";

import "common/v1/metadata.proto";
import "common/v1/fhir.proto";
import "google/protobuf/timestamp.proto";

service PatientService {
  // Patient CRUD
  rpc ListPatients(ListPatientsRequest) returns (ListPatientsResponse);
  rpc GetPatient(GetPatientRequest) returns (GetPatientResponse);
  rpc GetPatientBundle(GetPatientBundleRequest) returns (GetPatientBundleResponse);
  rpc CreatePatient(CreatePatientRequest) returns (CreatePatientResponse);
  rpc UpdatePatient(UpdatePatientRequest) returns (UpdatePatientResponse);
  rpc DeletePatient(DeletePatientRequest) returns (DeletePatientResponse);

  // Patient search and matching
  rpc SearchPatients(SearchPatientsRequest) returns (SearchPatientsResponse);
  rpc MatchPatients(MatchPatientsRequest) returns (MatchPatientsResponse);

  // Patient history
  rpc GetPatientHistory(GetPatientHistoryRequest) returns (GetPatientHistoryResponse);
  rpc GetPatientTimeline(GetPatientTimelineRequest) returns (GetPatientTimelineResponse);

  // Encounter CRUD
  rpc ListEncounters(ListEncountersRequest) returns (ListEncountersResponse);
  rpc GetEncounter(GetEncounterRequest) returns (GetEncounterResponse);
  rpc CreateEncounter(CreateEncounterRequest) returns (CreateEncounterResponse);
  rpc UpdateEncounter(UpdateEncounterRequest) returns (UpdateEncounterResponse);

  // Observation CRUD
  rpc ListObservations(ListObservationsRequest) returns (ListObservationsResponse);
  rpc GetObservation(GetObservationRequest) returns (GetObservationResponse);
  rpc CreateObservation(CreateObservationRequest) returns (CreateObservationResponse);

  // Condition CRUD
  rpc ListConditions(ListConditionsRequest) returns (ListConditionsResponse);
  rpc GetCondition(GetConditionRequest) returns (GetConditionResponse);
  rpc CreateCondition(CreateConditionRequest) returns (CreateConditionResponse);
  rpc UpdateCondition(UpdateConditionRequest) returns (UpdateConditionResponse);

  // MedicationRequest CRUD
  rpc ListMedicationRequests(ListMedicationRequestsRequest) returns (ListMedicationRequestsResponse);
  rpc GetMedicationRequest(GetMedicationRequestRequest) returns (GetMedicationRequestResponse);
  rpc CreateMedicationRequest(CreateMedicationRequestRequest) returns (CreateMedicationRequestResponse);
  rpc UpdateMedicationRequest(UpdateMedicationRequestRequest) returns (UpdateMedicationRequestResponse);

  // AllergyIntolerance CRUD
  rpc ListAllergyIntolerances(ListAllergyIntolerancesRequest) returns (ListAllergyIntolerancesResponse);
  rpc GetAllergyIntolerance(GetAllergyIntoleranceRequest) returns (GetAllergyIntoleranceResponse);
  rpc CreateAllergyIntolerance(CreateAllergyIntoleranceRequest) returns (CreateAllergyIntoleranceResponse);
  rpc UpdateAllergyIntolerance(UpdateAllergyIntoleranceRequest) returns (UpdateAllergyIntoleranceResponse);

  // Immunization CRUD
  rpc ListImmunizations(ListImmunizationsRequest) returns (ListImmunizationsResponse);
  rpc GetImmunization(GetImmunizationRequest) returns (GetImmunizationResponse);
  rpc CreateImmunization(CreateImmunizationRequest) returns (CreateImmunizationResponse);

  // Procedure CRUD
  rpc ListProcedures(ListProceduresRequest) returns (ListProceduresResponse);
  rpc GetProcedure(GetProcedureRequest) returns (GetProcedureResponse);
  rpc CreateProcedure(CreateProcedureRequest) returns (CreateProcedureResponse);

  // Generic CRUD for top-level resources (Practitioner, Organization, Location)
  rpc CreateResource(CreateResourceRequest) returns (CreateResourceResponse);
  rpc GetResource(GetResourceRequest) returns (GetResourceResponse);
  rpc ListResources(ListResourcesRequest) returns (ListResourcesResponse);
  rpc UpdateResource(UpdateResourceRequest) returns (UpdateResourceResponse);
  rpc DeleteResource(DeleteResourceRequest) returns (DeleteResourceResponse);

  // Flag CRUD (used by Sentinel Agent write-back)
  rpc CreateFlag(CreateFlagRequest) returns (CreateFlagResponse);
  rpc UpdateFlag(UpdateFlagRequest) returns (UpdateFlagResponse);

  // Batch operations
  rpc CreateBatch(CreateBatchRequest) returns (BatchResponse);

  // Index management
  rpc RebuildIndex(RebuildIndexRequest) returns (RebuildIndexResponse);
  rpc CheckIndexHealth(CheckIndexHealthRequest) returns (IndexHealthResponse);
  rpc ReindexResources(ReindexRequest) returns (ReindexResponse);

  // Health check
  rpc Health(HealthRequest) returns (HealthResponse);
}

// Mutation context passed on every mutating request
message MutationContext {
  string practitioner_id = 1;
  string node_id = 2;
  string site_id = 3;
  google.protobuf.Timestamp timestamp = 4;
}

// Git commit info returned on mutations
message GitCommitInfo {
  string commit_hash = 1;
  string message = 2;
  google.protobuf.Timestamp timestamp = 3;
}

// Patient CRUD
message ListPatientsRequest {
  common.v1.PaginationRequest pagination = 1;
  string gender = 2;
  string birth_date_from = 3;
  string birth_date_to = 4;
  string site_id = 5;
  string status = 6;
  bool has_alerts = 7;
}

message ListPatientsResponse {
  repeated common.v1.FHIRResource patients = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetPatientRequest {
  string patient_id = 1;
}

message GetPatientResponse {
  common.v1.FHIRResource patient = 1;
  repeated common.v1.FHIRResource encounters = 2;
  repeated common.v1.FHIRResource observations = 3;
  repeated common.v1.FHIRResource conditions = 4;
  repeated common.v1.FHIRResource medication_requests = 5;
  repeated common.v1.FHIRResource allergy_intolerances = 6;
  repeated common.v1.FHIRResource flags = 7;
}

message GetPatientBundleRequest {
  string patient_id = 1;
}

message GetPatientBundleResponse {
  common.v1.FHIRResource patient = 1;
  repeated common.v1.FHIRResource encounters = 2;
  repeated common.v1.FHIRResource observations = 3;
  repeated common.v1.FHIRResource conditions = 4;
  repeated common.v1.FHIRResource medication_requests = 5;
  repeated common.v1.FHIRResource allergy_intolerances = 6;
  repeated common.v1.FHIRResource flags = 7;
}

message CreatePatientRequest {
  bytes fhir_json = 1;
  MutationContext context = 2;
}

message CreatePatientResponse {
  common.v1.FHIRResource patient = 1;
  GitCommitInfo git = 2;
}

message UpdatePatientRequest {
  string patient_id = 1;
  bytes fhir_json = 2;
  MutationContext context = 3;
}

message UpdatePatientResponse {
  common.v1.FHIRResource patient = 1;
  GitCommitInfo git = 2;
}

message DeletePatientRequest {
  string patient_id = 1;
  MutationContext context = 2;
}

message DeletePatientResponse {
  GitCommitInfo git = 1;
}

message SearchPatientsRequest {
  string query = 1;
  common.v1.PaginationRequest pagination = 2;
}

message SearchPatientsResponse {
  repeated common.v1.FHIRResource patients = 1;
  common.v1.PaginationResponse pagination = 2;
}

message MatchPatientsRequest {
  string family_name = 1;
  repeated string given_names = 2;
  string gender = 3;
  string birth_date_approx = 4;
  string district = 5;
  double threshold = 6;
}

message MatchPatientsResponse {
  repeated PatientMatch matches = 1;
}

message PatientMatch {
  string patient_id = 1;
  double confidence = 2;
  repeated string match_factors = 3;
}

message GetPatientHistoryRequest {
  string patient_id = 1;
}

message GetPatientHistoryResponse {
  repeated HistoryEntry entries = 1;
}

message HistoryEntry {
  string commit_hash = 1;
  string timestamp = 2;
  string author = 3;
  string node = 4;
  string site = 5;
  string operation = 6;
  string resource_type = 7;
  string resource_id = 8;
  string message = 9;
}

message GetPatientTimelineRequest {
  string patient_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message GetPatientTimelineResponse {
  repeated TimelineEvent events = 1;
  common.v1.PaginationResponse pagination = 2;
}

message TimelineEvent {
  string event_type = 1;
  string resource_id = 2;
  string date = 3;
  bytes fhir_json = 4;
}

// Encounters
message ListEncountersRequest {
  string patient_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message ListEncountersResponse {
  repeated common.v1.FHIRResource encounters = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetEncounterRequest {
  string patient_id = 1;
  string encounter_id = 2;
}

message GetEncounterResponse {
  common.v1.FHIRResource encounter = 1;
}

message CreateEncounterRequest {
  string patient_id = 1;
  bytes fhir_json = 2;
  MutationContext context = 3;
}

message CreateEncounterResponse {
  common.v1.FHIRResource encounter = 1;
  GitCommitInfo git = 2;
}

message UpdateEncounterRequest {
  string patient_id = 1;
  string encounter_id = 2;
  bytes fhir_json = 3;
  MutationContext context = 4;
}

message UpdateEncounterResponse {
  common.v1.FHIRResource encounter = 1;
  GitCommitInfo git = 2;
}

// Observations
message ListObservationsRequest {
  string patient_id = 1;
  string code = 2;
  string category = 3;
  string date_from = 4;
  string date_to = 5;
  string encounter_id = 6;
  common.v1.PaginationRequest pagination = 7;
}

message ListObservationsResponse {
  repeated common.v1.FHIRResource observations = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetObservationRequest {
  string patient_id = 1;
  string observation_id = 2;
}

message GetObservationResponse {
  common.v1.FHIRResource observation = 1;
}

message CreateObservationRequest {
  string patient_id = 1;
  bytes fhir_json = 2;
  MutationContext context = 3;
}

message CreateObservationResponse {
  common.v1.FHIRResource observation = 1;
  GitCommitInfo git = 2;
}

// Conditions
message ListConditionsRequest {
  string patient_id = 1;
  string clinical_status = 2;
  string category = 3;
  string code = 4;
  common.v1.PaginationRequest pagination = 5;
}

message ListConditionsResponse {
  repeated common.v1.FHIRResource conditions = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetConditionRequest {
  string patient_id = 1;
  string condition_id = 2;
}

message GetConditionResponse {
  common.v1.FHIRResource condition = 1;
}

message CreateConditionRequest {
  string patient_id = 1;
  bytes fhir_json = 2;
  MutationContext context = 3;
}

message CreateConditionResponse {
  common.v1.FHIRResource condition = 1;
  GitCommitInfo git = 2;
}

message UpdateConditionRequest {
  string patient_id = 1;
  string condition_id = 2;
  bytes fhir_json = 3;
  MutationContext context = 4;
}

message UpdateConditionResponse {
  common.v1.FHIRResource condition = 1;
  GitCommitInfo git = 2;
}

// Medication Requests
message ListMedicationRequestsRequest {
  string patient_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message ListMedicationRequestsResponse {
  repeated common.v1.FHIRResource medication_requests = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetMedicationRequestRequest {
  string patient_id = 1;
  string medication_request_id = 2;
}

message GetMedicationRequestResponse {
  common.v1.FHIRResource medication_request = 1;
}

message CreateMedicationRequestRequest {
  string patient_id = 1;
  bytes fhir_json = 2;
  MutationContext context = 3;
}

message CreateMedicationRequestResponse {
  common.v1.FHIRResource medication_request = 1;
  GitCommitInfo git = 2;
}

message UpdateMedicationRequestRequest {
  string patient_id = 1;
  string medication_request_id = 2;
  bytes fhir_json = 3;
  MutationContext context = 4;
}

message UpdateMedicationRequestResponse {
  common.v1.FHIRResource medication_request = 1;
  GitCommitInfo git = 2;
}

// Allergy Intolerances
message ListAllergyIntolerancesRequest {
  string patient_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message ListAllergyIntolerancesResponse {
  repeated common.v1.FHIRResource allergy_intolerances = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetAllergyIntoleranceRequest {
  string patient_id = 1;
  string allergy_intolerance_id = 2;
}

message GetAllergyIntoleranceResponse {
  common.v1.FHIRResource allergy_intolerance = 1;
}

message CreateAllergyIntoleranceRequest {
  string patient_id = 1;
  bytes fhir_json = 2;
  MutationContext context = 3;
}

message CreateAllergyIntoleranceResponse {
  common.v1.FHIRResource allergy_intolerance = 1;
  GitCommitInfo git = 2;
}

message UpdateAllergyIntoleranceRequest {
  string patient_id = 1;
  string allergy_intolerance_id = 2;
  bytes fhir_json = 3;
  MutationContext context = 4;
}

message UpdateAllergyIntoleranceResponse {
  common.v1.FHIRResource allergy_intolerance = 1;
  GitCommitInfo git = 2;
}

// Immunizations
message ListImmunizationsRequest {
  string patient_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message ListImmunizationsResponse {
  repeated common.v1.FHIRResource immunizations = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetImmunizationRequest {
  string patient_id = 1;
  string immunization_id = 2;
}

message GetImmunizationResponse {
  common.v1.FHIRResource immunization = 1;
}

message CreateImmunizationRequest {
  string patient_id = 1;
  bytes fhir_json = 2;
  MutationContext context = 3;
}

message CreateImmunizationResponse {
  common.v1.FHIRResource immunization = 1;
  GitCommitInfo git = 2;
}

// Procedures
message ListProceduresRequest {
  string patient_id = 1;
  common.v1.PaginationRequest pagination = 2;
}

message ListProceduresResponse {
  repeated common.v1.FHIRResource procedures = 1;
  common.v1.PaginationResponse pagination = 2;
}

message GetProcedureRequest {
  string patient_id = 1;
  string procedure_id = 2;
}

message GetProcedureResponse {
  common.v1.FHIRResource procedure = 1;
}

message CreateProcedureRequest {
  string patient_id = 1;
  bytes fhir_json = 2;
  MutationContext context = 3;
}

message CreateProcedureResponse {
  common.v1.FHIRResource procedure = 1;
  GitCommitInfo git = 2;
}

// Generic Resource CRUD (Practitioner, Organization, Location)
message CreateResourceRequest {
  string resource_type = 1;
  bytes fhir_json = 2;
  MutationContext context = 3;
}

message CreateResourceResponse {
  common.v1.FHIRResource resource = 1;
  GitCommitInfo git = 2;
}

message GetResourceRequest {
  string resource_type = 1;
  string resource_id = 2;
}

message GetResourceResponse {
  common.v1.FHIRResource resource = 1;
}

message ListResourcesRequest {
  string resource_type = 1;
  common.v1.PaginationRequest pagination = 2;
}

message ListResourcesResponse {
  repeated common.v1.FHIRResource resources = 1;
  common.v1.PaginationResponse pagination = 2;
}

message UpdateResourceRequest {
  string resource_type = 1;
  string resource_id = 2;
  bytes fhir_json = 3;
  MutationContext context = 4;
}

message UpdateResourceResponse {
  common.v1.FHIRResource resource = 1;
  GitCommitInfo git = 2;
}

message DeleteResourceRequest {
  string resource_type = 1;
  string resource_id = 2;
  MutationContext context = 3;
}

message DeleteResourceResponse {
  GitCommitInfo git = 1;
}

// Flags (Sentinel Agent write-back)
message CreateFlagRequest {
  string patient_id = 1;
  bytes fhir_json = 2;
  MutationContext context = 3;
}

message CreateFlagResponse {
  common.v1.FHIRResource flag = 1;
  GitCommitInfo git = 2;
}

message UpdateFlagRequest {
  string patient_id = 1;
  string flag_id = 2;
  bytes fhir_json = 3;
  MutationContext context = 4;
}

message UpdateFlagResponse {
  common.v1.FHIRResource flag = 1;
  GitCommitInfo git = 2;
}

// Batch operations
message CreateBatchRequest {
  string patient_id = 1;
  repeated common.v1.FHIRResource resources = 2;
  MutationContext context = 3;
  bool atomic = 4;
}

message BatchResponse {
  repeated BatchItemResult results = 1;
  GitCommitInfo git = 2;
}

message BatchItemResult {
  string resource_type = 1;
  string resource_id = 2;
  bool success = 3;
  string error = 4;
}

// Index management
message RebuildIndexRequest {}

message RebuildIndexResponse {
  int32 resources_indexed = 1;
  string git_head = 2;
  int64 duration_ms = 3;
}

message CheckIndexHealthRequest {}

message IndexHealthResponse {
  bool healthy = 1;
  string index_head = 2;
  string git_head = 3;
  int32 index_count = 4;
  int32 git_count = 5;
  string message = 6;
}

message ReindexRequest {
  repeated string resource_paths = 1;
}

message ReindexResponse {
  int32 indexed = 1;
  int32 failed = 2;
  repeated string errors = 3;
}

// Health check
message HealthRequest {}

message HealthResponse {
  string status = 1;
  string git_head = 2;
  int32 patient_count = 3;
  bool index_healthy = 4;
}
