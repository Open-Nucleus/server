name: open_nucleus_app
description: Open Nucleus — offline-first EHR desktop client for military FOBs, disaster relief, and clinics.
version: 0.1.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1

  # Code generation annotations
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.2.0

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Cryptography (Ed25519)
  cryptography: ^2.7.0

  # Charts
  fl_chart: ^0.68.0

  # Window management (desktop)
  window_manager: ^0.3.9

  # Value equality
  equatable: ^2.0.5

  # Internationalization / date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  # Only macOS and Windows — no mobile or web platforms
  # Platform runner directories: macos/ and windows/
